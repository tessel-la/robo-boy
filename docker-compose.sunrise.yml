services:
  ros-stack:
    environment:
      - ROBOT_WORKSPACE_SETUP=/workspace/sunrise_robot_sw/install/setup.bash
    volumes:
      - ${SUNRISE_ROBOT_SW_DIR:-../sunrise_robot_sw}/install:/overlay_ws/sunrise:ro
      # Keep Sunrise's original workspace paths available for generated hooks,
      # symlink-install metadata, and Python packages that still refer to them.
      - ${SUNRISE_ROBOT_SW_DIR:-../sunrise_robot_sw}/install:/workspace/sunrise_robot_sw/install:ro
      - ${SUNRISE_ROBOT_SW_DIR:-../sunrise_robot_sw}/build:/workspace/sunrise_robot_sw/build:ro
      - ${SUNRISE_ROBOT_SW_DIR:-../sunrise_robot_sw}/src:/workspace/sunrise_robot_sw/src:ro
