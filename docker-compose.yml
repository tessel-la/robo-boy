services:
  # React App Development Server
  app:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.dev
    volumes:
      - .:/app
      - /app/node_modules 
    command: npm run dev -- --host 0.0.0.0
    ipc: host
    environment:
      - NODE_ENV=development
    # Remove ports mapping if Caddy handles external access
    # ports:
    #   - "127.0.0.1:5173:5173" 
    networks: # Assign to custom network
      - app-net

  # Caddy Reverse Proxy
  caddy:
    image: caddy:latest
    restart: unless-stopped
    ipc: host
    ports:
      - "80:80"    # Bind to all host interfaces
      - "443:443"  # Bind to all host interfaces
      - "0.0.0.0:443:443/udp" # Bind to all host interfaces
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./infra/caddy/certs:/etc/caddy/certs:ro # Mount the certs directory (read-only)
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app
      - ros-stack
    networks:
      - app-net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ROS 2 Stack (Rosbridge + Image Publisher)
  # network_mode: host so ROS 2 DDS multicast discovery works with other
  # host-networked containers (e.g. aerial_sim_cont). Port mappings are
  # incompatible with host networking; Caddy reaches services via
  # host.docker.internal instead of the ros-stack hostname.
  ros-stack:
    restart: unless-stopped
    network_mode: host
    ipc: host
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.ros # Use the ROS Dockerfile
      args:
        ROS_DISTRO: ${ROS_DISTRO:-jazzy}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${CYCLONEDDS_CONFIG_PATH:-./config/cyclonedds/default.xml}:/etc/cyclonedds/config.xml:ro
    environment:
      - DISPLAY=${DISPLAY}
      - ROS_DISTRO=${ROS_DISTRO:-jazzy}
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-14}
      - ROS_LOCALHOST_ONLY=${ROS_LOCALHOST_ONLY:-0}
      # Switch between Fast DDS and Cyclone DDS by setting RMW_IMPLEMENTATION.
      # Fast DDS keeps UDP transport by default to avoid shared-memory issues
      # across host-networked containers running as different users.
      - RMW_IMPLEMENTATION=${RMW_IMPLEMENTATION:-rmw_fastrtps_cpp}
      - FASTDDS_BUILTIN_TRANSPORTS=${FASTDDS_BUILTIN_TRANSPORTS:-UDPv4}
      - CYCLONEDDS_URI=${CYCLONEDDS_URI:-file:///etc/cyclonedds/config.xml}

volumes:
  caddy-data:
  caddy-config:

# Define the custom bridge network
networks:
  app-net:
    driver: bridge
