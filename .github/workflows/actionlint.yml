name: Workflow Lint

on:
  workflow_dispatch:
  push:
    branches: [main, dev]
    paths:
      - '.github/workflows/**'
      - '.github/scripts/**'
  pull_request:
    branches: [main, dev]
    paths:
      - '.github/workflows/**'
      - '.github/scripts/**'

permissions:
  contents: read

concurrency:
  group: workflow-lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: Validate GitHub Actions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run actionlint
        uses: raven-actions/actionlint@v2
