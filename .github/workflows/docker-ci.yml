name: Docker Build

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  docker-build-test:
    name: Docker Build Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Test Docker build for app
      run: |
        docker build -t robo-boy-app -f infra/docker/Dockerfile.dev .
        echo "✅ App container build successful"

    - name: Test Docker build for ROS stack
      run: |
        docker build -t robo-boy-ros -f infra/docker/Dockerfile.ros .
        echo "✅ ROS stack container build successful"

    - name: Test Docker Compose setup
      run: |
        # Create dummy certs directory and files required by docker-compose
        mkdir -p infra/caddy/certs
        touch infra/caddy/certs/local-key.pem
        touch infra/caddy/certs/local-cert.pem
        
        # Run docker-compose build to test all services
        docker compose build
        echo "✅ Docker Compose build successful"
