name: Docker Build

on:
  workflow_dispatch:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

permissions:
  contents: read

concurrency:
  group: docker-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-build-test:
    name: Docker Build Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Test Docker build for app
      id: app_build
      run: |
        set +e
        docker build -t robo-boy-app -f infra/docker/Dockerfile.dev . 2>&1 | tee docker-app-output.log
        status=${PIPESTATUS[0]}
        .github/scripts/write-log-summary.sh "Docker App Build" "${status}" docker-app-output.log "docker build -t robo-boy-app -f infra/docker/Dockerfile.dev ." 180
        exit "${status}"

    - name: Test Docker build for ROS stack
      id: ros_build
      run: |
        set +e
        docker build -t robo-boy-ros -f infra/docker/Dockerfile.ros . 2>&1 | tee docker-ros-output.log
        status=${PIPESTATUS[0]}
        .github/scripts/write-log-summary.sh "Docker ROS Build" "${status}" docker-ros-output.log "docker build -t robo-boy-ros -f infra/docker/Dockerfile.ros ." 180
        exit "${status}"

    - name: Test Docker Compose setup
      id: compose_build
      run: |
        # Create dummy certs directory and files required by docker-compose
        mkdir -p infra/caddy/certs
        touch infra/caddy/certs/local-key.pem
        touch infra/caddy/certs/local-cert.pem

        # Run docker-compose build to test all services
        set +e
        docker compose build 2>&1 | tee docker-compose-output.log
        status=${PIPESTATUS[0]}
        .github/scripts/write-log-summary.sh "Docker Compose Build" "${status}" docker-compose-output.log "docker compose build" 220
        exit "${status}"
