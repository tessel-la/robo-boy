name: Docker Build

on:
  workflow_dispatch:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

permissions:
  contents: read

concurrency:
  group: docker-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Docker-relevant changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      docker: ${{ steps.filter.outputs.docker }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Check changed paths
      id: filter
      uses: dorny/paths-filter@v4
      with:
        base: ${{ github.ref_name }}
        filters: |
          docker:
            - 'src/**'
            - 'config/**'
            - 'public/**'
            - 'scripts/**'
            - 'package.json'
            - 'package-lock.json'
            - 'index.html'
            - 'tsconfig.json'
            - 'docker-compose.yml'
            - 'compose/**'
            - 'infra/docker/**'
            - 'infra/caddy/**'
            - '.dockerignore'
            - '.github/workflows/docker-ci.yml'
            - '.github/scripts/**'

    - name: Write Docker plan
      run: |
        {
          echo "### Docker CI Plan"
          echo ""
          echo "| Area | Changed | Action |"
          echo "| ---- | ------- | ------ |"
          echo "| Docker build inputs | ${{ steps.filter.outputs.docker }} | $([ '${{ steps.filter.outputs.docker }}' = 'true' ] && echo 'Run Docker builds' || echo 'Skip unless manually triggered') |"
        } >> "$GITHUB_STEP_SUMMARY"

  docker-build-test:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: changes

    steps:
    - name: Skip Docker builds
      if: github.event_name != 'workflow_dispatch' && needs.changes.outputs.docker != 'true'
      run: |
        {
          echo "### Docker Builds"
          echo ""
          echo "No Docker build inputs changed. Skipping app, ROS, and Compose builds."
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Checkout code
      if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.docker == 'true'
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.docker == 'true'
      uses: docker/setup-buildx-action@v3

    - name: Test Docker build for app
      if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.docker == 'true'
      id: app_build
      run: |
        set +e
        docker build -t robo-boy-app -f infra/docker/Dockerfile.dev . 2>&1 | tee docker-app-output.log
        status=${PIPESTATUS[0]}
        .github/scripts/write-log-summary.sh "Docker App Build" "${status}" docker-app-output.log "docker build -t robo-boy-app -f infra/docker/Dockerfile.dev ." 180
        exit "${status}"

    - name: Test Docker build for ROS stack
      if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.docker == 'true'
      id: ros_build
      run: |
        set +e
        docker build -t robo-boy-ros -f infra/docker/Dockerfile.ros . 2>&1 | tee docker-ros-output.log
        status=${PIPESTATUS[0]}
        .github/scripts/write-log-summary.sh "Docker ROS Build" "${status}" docker-ros-output.log "docker build -t robo-boy-ros -f infra/docker/Dockerfile.ros ." 180
        exit "${status}"

    - name: Test Docker Compose setup
      if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.docker == 'true'
      id: compose_build
      run: |
        # Create dummy certs directory and files required by docker-compose
        mkdir -p infra/caddy/certs
        touch infra/caddy/certs/local-key.pem
        touch infra/caddy/certs/local-cert.pem

        # Run docker-compose build to test all services
        set +e
        docker compose build 2>&1 | tee docker-compose-output.log
        status=${PIPESTATUS[0]}
        .github/scripts/write-log-summary.sh "Docker Compose Build" "${status}" docker-compose-output.log "docker compose build" 220
        exit "${status}"
